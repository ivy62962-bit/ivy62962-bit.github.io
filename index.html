<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Limuyang · AI 作品集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0d17;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* 深邃星空背景 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      background: rgba(18, 20, 40, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 2.5rem;
      padding: 3rem 2.5rem;
      max-width: 720px;
      width: 90%;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      color: #eef5ff;
      transition: all 0.3s ease;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: 500;
      color: white;
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.45);
      margin-bottom: 0.5rem;
      user-select: none;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #e0e7ff, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      background: rgba(167, 139, 250, 0.18);
      color: #c4b5fd;
      padding: 0.3rem 1.2rem;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid rgba(196, 181, 253, 0.35);
      margin-top: 0.3rem;
    }

    .bio {
      color: #b9c2d9;
      margin: 1.5rem 0 2rem;
      line-height: 1.7;
      font-size: 1.05rem;
      text-align: center;
      min-height: 3.5rem;
    }

    /* 打字机光标 */
    .cursor {
      display: inline-block;
      width: 2px;
      background: #a78bfa;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.2rem;
      margin: 2rem 0 2.2rem;
    }

    .project-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      padding: 1.5rem 1rem;
      text-align: center;
      transition: transform 0.25s, background 0.3s, border-color 0.3s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .project-card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .project-emoji {
      font-size: 2.3rem;
      margin-bottom: 0.5rem;
    }

    .project-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: #f1f5f9;
      margin-bottom: 0.3rem;
    }

    .project-desc {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-top: 0.8rem;
    }

    .link-item {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s;
    }

    .link-item:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
      color: white;
    }

    @media (max-width: 500px) {
      .card {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- 星空画布 -->
  <canvas class="stars" id="starsCanvas"></canvas>

  <div class="card">
    <div class="profile">
      <div class="avatar">🧑‍🚀</div>
      <h1>Limuyang</h1>
      <div class="badge">AI 产品设计师 · 创意技术开发者</div>
    </div>

    <div class="bio" id="typingBio"></div>

    <div class="projects">
      <div class="project-card">
        <div class="project-emoji">🤖</div>
        <div class="project-title">智能对话引擎</div>
        <div class="project-desc">企业级AI助手</div>
      </div>
      <div class="project-card">
        <div class="project-emoji">🎨</div>
        <div class="project-title">风格迁移工具</div>
        <div class="project-desc">视觉设计自动化</div>
      </div>
      <div class="project-card">
        <div class="project-emoji">📊</div>
        <div class="project-title">数据可视化</div>
        <div class="project-desc">实时洞察仪表盘</div>
      </div>
    </div>

    <div class="links">
      <a href="#" class="link-item">
        <span>📁</span> GitHub
      </a>
      <a href="#" class="link-item">
        <span>💼</span> 项目
      </a>
      <a href="#" class="link-item">
        <span>✉️</span> 联系
      </a>
    </div>
  </div>

  <script>
    (function() {
      // ---------- 打字机效果 ----------
      const bioText = "探索 AI 与交互设计的边界 · 正在构建下一代智能产品体验。";
      const bioElement = document.getElementById('typingBio');
      let charIndex = 0;

      function typeWriter() {
        if (bioElement && charIndex < bioText.length) {
          bioElement.innerHTML = bioText.substring(0, charIndex + 1) + '<span class="cursor"></span>';
          charIndex++;
          setTimeout(typeWriter, 65);
        } else if (bioElement) {
          // 打字结束后保留光标继续闪烁
          bioElement.innerHTML = bioText + '<span class="cursor"></span>';
        }
      }

      // 启动打字机
      if (bioElement) {
        typeWriter();
      }

      // ---------- 星空背景 ----------
      const canvas = document.getElementById('starsCanvas');
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      let width, height;
      let stars = [];

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function createStars(count = 160) {
        stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2.2 + 0.6,
            alpha: Math.random(),
            deltaAlpha: (Math.random() * 0.015) + 0.005,
            direction: Math.random() > 0.5 ? 1 : -1
          });
        }
      }

      function drawStars() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#ffffff';

        for (let s of stars) {
          // 星星闪烁
          s.alpha += s.deltaAlpha * s.direction;
          if (s.alpha >= 0.95) {
            s.alpha = 0.95;
            s.direction = -1;
          } else if (s.alpha <= 0.15) {
            s.alpha = 0.15;
            s.direction = 1;
          }

          ctx.globalAlpha = s.alpha;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(drawStars);
      }

      // 初始化星空
      resizeCanvas();
      createStars();
      drawStars();

      // 窗口大小改变时重新绘制
      window.addEventListener('resize', () => {
        resizeCanvas();
        createStars();
      });
    })();
  </script>
</body>
</html>
